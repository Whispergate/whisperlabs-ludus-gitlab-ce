---
- name: Create GitLab SSL directory
  ansible.builtin.file:
    path: /etc/gitlab/ssl
    state: directory
    mode: '0755'

- name: Generate self-signed SSL certificate for GitLab
  ansible.builtin.shell: >
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048 
    -keyout /etc/gitlab/ssl/{{ gitlab_url | regex_replace('^https://', '') }}.key 
    -out /etc/gitlab/ssl/{{ gitlab_url | regex_replace('^https://', '') }}.crt 
    -subj "/CN={{ gitlab_url | regex_replace('^https://', '') }}"
  args:
    creates: "/etc/gitlab/ssl/{{ gitlab_url | regex_replace('^https://', '') }}.crt"

- name: Inject Gitlab primary configuration template
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    owner: root
    group: root
    mode: '0600'
  notify: trigger_gitlab_reconfigure

- name: Flush handlers to ensure instance is fully operational before post-config
  ansible.builtin.meta: flush_handlers

- name: Set GitLab root password
  ansible.builtin.shell: |
    gitlab-rake "gitlab:password:reset[root]" << 'EOF'
    {{ gitlab_root_password }}
    {{ gitlab_root_password }}
    EOF
  changed_when: false
