---
- name: Inject Gitlab primary configuration template
  ansible.builtin.template:
    src: gitlab.rb.j2
    dest: /etc/gitlab/gitlab.rb
    owner: root
    group: root
    mode: '0600'
  notify: trigger_gitlab_reconfigure

- name: Flush handlers to ensure instance is fully operational before post-config
  ansible.builtin.meta: flush_handlers

- name: Set GitLab root password
  ansible.builtin.shell: |
    gitlab-rake "gitlab:password:reset[root]" << 'EOF'
    {{ gitlab_root_password }}
    {{ gitlab_root_password }}
    EOF
  changed_when: false
