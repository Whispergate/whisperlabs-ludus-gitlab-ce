---
- name: Template PAT generation script
  ansible.builtin.template:
    src: create_pat.rb.j2
    dest: /tmp/create_pat.rb
    mode: '0644'

- name: Generate root PAT via Rails runner
  ansible.builtin.shell: gitlab-rails runner /tmp/create_pat.rb
  register: gitlab_pat
  changed_when: false

- name: Remove PAT script
  ansible.builtin.file:
    path: /tmp/create_pat.rb
    state: absent

- name: Create GitLab projects
  ansible.builtin.uri:
    url: "http://localhost/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_pat.stdout_lines[-1] }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      visibility: "{{ item.visibility }}"
    status_code: [200, 201]
  loop: "{{ gitlab_projects }}"
  when: gitlab_projects | length > 0
